output-format: json
strictness: high
doc-warnings: true

ignore-paths:
  - tests/
  - docs/
  - build/
  - dist/
  - .venv/

mypy:
  run: true
  options:
    config-file: pyproject.toml
    follow-imports: normal

ruff:
  run: true

bandit:
  run: true

# pydocstyle disabled - ruff handles Google-style docstrings
pydocstyle:
  run: false

# pycodestyle disabled - ruff handles style checking
pycodestyle:
  run: false

# pyflakes disabled - ruff handles this
pyflakes:
  run: false

# mccabe disabled - ruff handles complexity
mccabe:
  run: false

# vulture with whitelist support (prospector-extended 0.2.0+)
vulture:
  run: true
  options:
    min-confidence: 80
    whitelist-paths:
      - vulture_whitelist.py

pylint:
  run: true

# complexipy checks cognitive complexity
complexipy:
  run: true

# interrogate checks docstring coverage (percentage of documented functions/classes)
interrogate:
  run: true
  options:
    fail-under: 80
    ignore-init-method: true
    ignore-init-module: true
    ignore-magic: true
    ignore-private: true
    ignore-property-decorators: true
    verbose: 0

# dodgy checks for hardcoded secrets
dodgy:
  run: true
